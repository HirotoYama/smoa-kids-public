<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMOA KIDS - Flag Button</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  .flag-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    outline: none;
    transition: transform 0.15s ease;
    display: block;
  }
  .flag-btn:hover { transform: scale(1.08); }
  .flag-btn:active { transform: scale(0.92); }
  .flag-btn img {
    width: 200px;
    height: 133px;
    object-fit: contain;
    display: block;
    pointer-events: none;
  }
  .flag-particle {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    width: 48px;
    height: 34px;
    object-fit: contain;
    left: 50%;
    top: 50%;
    opacity: 0;
    animation: bigFirework var(--dur) cubic-bezier(0.1, 0.6, 0.3, 1) forwards;
    animation-delay: var(--delay);
  }
  @keyframes bigFirework {
    0%   { transform: translate(-50%,-50%) scale(0) rotate(0deg); opacity: 1; }
    30%  { opacity: 1; }
    60%  { transform: translate(calc(-50% + var(--ex)), calc(-50% + var(--ey))) scale(1.2) rotate(var(--r1)); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--ex)), calc(-50% + var(--ey2))) scale(0.7) rotate(var(--r2)); opacity: 0; }
  }
</style>
</head>

<script>
  var FLAG_SRC = document.querySelector('.flag-btn img').src;

  function handleClick() {
    var W = window.innerWidth;
    var count = 40;
    for (var i = 0; i < count; i++) {
      (function(idx) {
        var el = document.createElement('img');
        el.classList.add('flag-particle');
        el.src = FLAG_SRC;
        el.alt = 'US flag';
        var angle = (idx / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
        var dist = W * 0.4 + Math.random() * W * 0.25;
        var ex = Math.cos(angle) * dist;
        var ey = Math.sin(angle) * dist;
        var ey2 = ey + 60 + Math.random() * 80;
        var r1 = (Math.random() - 0.5) * 180;
        var r2 = r1 + (Math.random() - 0.5) * 180;
        var dur = 2.2 + Math.random() * 0.8;
        var delay = Math.random() * 0.3;
        el.style.cssText = '--ex:'+ex+'px;--ey:'+ey+'px;--ey2:'+ey2+'px;--r1:'+r1+'deg;--r2:'+r2+'deg;--dur:'+dur+'s;--delay:'+delay+'s;';
        document.body.appendChild(el);
        setTimeout(function(){ el.remove(); }, (dur + delay) * 1000 + 200);
      })(i);
    }
  }
</script>
